name: Syndicate Blog

on:
  push:
    branches: [main]
    paths: ['src/content/blog/**.mdx']
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Re-syndicate ALL non-draft posts (ignores content hash)'
        type: boolean
        default: false
      slug:
        description: 'Syndicate a single slug (filename without .mdx)'
        type: string
        default: ''
      dry_run:
        description: 'Parse and validate, but do not publish'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  syndicate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore syndication state cache
        uses: actions/cache@v4
        with:
          path: .syndication.json
          key: syndication-state-v1-${{ github.run_id }}
          restore-keys: syndication-state-v1-

      - name: Run syndication
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_PAT: ${{ secrets.HASHNODE_PAT }}
          HASHNODE_PUBLICATION_HOST: ${{ secrets.HASHNODE_PUBLICATION_HOST }}
          SITE_URL: https://vineethnk.in
          DRY_RUN: ${{ inputs.dry_run || false }}
          BACKFILL: ${{ inputs.backfill || false }}
          SLUG: ${{ inputs.slug || '' }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_EVENT_AFTER: ${{ github.event.after }}
        run: node scripts/syndicate.mjs
